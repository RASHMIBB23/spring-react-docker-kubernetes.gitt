apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
      - name: client
        image: rashmi200/react-client:1.0
        env:
        - name: BROWSER
          value: "none"
        ports:
        - containerPort: 3000

